<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart - Amazon Clone</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="sticky-top">
      <!-- Main Navbar -->
      <nav class="bg-[#0f1111] text-white">
        <div
          class="d-flex align-items-center justify-content-between px-2 py-2"
        >
          <!-- Logo -->
          <a href="index.html" class="text-decoration-none">
            <div
              class="nav-logo border border-transparent hover:border-white transition-all px-2 py-1 cursor-pointer"
            >
              <svg class="w-24 h-10" viewBox="0 0 100 30" fill="white">
                <text
                  x="5"
                  y="22"
                  font-family="Arial"
                  font-size="24"
                  font-weight="bold"
                >
                  amazon
                </text>
                <path
                  d="M 35 25 Q 50 28, 65 25"
                  stroke="#FF9900"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </div>
          </a>

          <!-- Delivery Address -->
          <div
            class="nav-address border border-transparent hover:border-white transition-all px-2 py-1 cursor-pointer d-none d-md-flex flex-column"
          >
            <span class="text-xs text-gray-300">Deliver to</span>
            <div class="d-flex align-items-center">
              <i class="fa-solid fa-location-dot me-1"></i>
              <span class="fw-bold">India</span>
            </div>
          </div>

          <!-- Search Bar -->
          <div class="flex-grow-1 mx-2 d-flex" style="max-width: 800px">
            <div class="input-group">
              <select
                class="form-select rounded-start"
                style="max-width: 60px; background-color: #f3f3f3"
              >
                <option>All</option>
              </select>
              <input
                type="text"
                class="form-control border-0"
                placeholder="Search Amazon"
              />
              <button
                class="btn rounded-end"
                style="background-color: #febd69; color: #0f1111"
              >
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </div>
          </div>

          <!-- Sign In -->
          <div
            class="nav-signin border border-transparent hover:border-white transition-all px-2 py-1 cursor-pointer d-none d-lg-flex flex-column"
          >
            <span class="text-xs">Hello, sign in</span>
            <span class="fw-bold text-sm">Account & Lists</span>
          </div>

          <!-- Returns & Orders -->
          <div
            class="nav-return border border-transparent hover:border-white transition-all px-2 py-1 cursor-pointer d-none d-lg-flex flex-column"
          >
            <span class="text-xs">Returns</span>
            <span class="fw-bold text-sm">& Orders</span>
          </div>

          <!-- Cart -->
          <a href="cart.html" class="text-decoration-none text-white">
            <div
              class="nav-cart border border-transparent hover:border-white transition-all px-2 py-1 cursor-pointer d-flex align-items-center position-relative"
            >
              <i class="fa-solid fa-cart-shopping fs-4 me-1"></i>
              <span class="fw-bold">Cart</span>
              <span
                id="cart-count"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                style="display: none"
              >
                0
              </span>
            </div>
          </a>
        </div>
      </nav>

      <!-- Secondary Panel -->
      <div class="bg-[#232f3e] text-white py-2 px-3">
        <div class="d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-3">
            <div
              class="cursor-pointer hover:border hover:border-white px-2 py-1"
            >
              <i class="fa-solid fa-bars me-2"></i>All
            </div>
            <div class="d-none d-md-flex gap-3 text-sm">
              <a
                href="index.html"
                class="text-white text-decoration-none cursor-pointer hover:border hover:border-white px-2 py-1"
                >Home</a
              >
              <span
                class="cursor-pointer hover:border hover:border-white px-2 py-1"
                >Today's Deal</span
              >
              <span
                class="cursor-pointer hover:border hover:border-white px-2 py-1"
                >Customer Service</span
              >
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Cart Content -->
    <div class="container my-5">
      <div class="row">
        <!-- Cart Items -->
        <div class="col-lg-8">
          <div class="bg-white p-4 rounded shadow-sm">
            <h2 class="mb-4">Shopping Cart</h2>
            <div id="cart-items-container">
              <!-- Cart items will be loaded here -->
            </div>
          </div>
        </div>

        <!-- Cart Summary -->
        <div class="col-lg-4">
          <div
            class="bg-white p-4 rounded shadow-sm sticky-top"
            style="top: 120px"
          >
            <h5 class="mb-3">Order Summary</h5>
            <div class="d-flex justify-content-between mb-2">
              <span
                >Subtotal (<span id="summary-item-count">0</span> items):</span
              >
              <span class="fw-bold"
                >$<span id="summary-subtotal">0.00</span></span
              >
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Shipping:</span>
              <span class="text-success fw-bold">FREE</span>
            </div>
            <hr />
            <div class="d-flex justify-content-between mb-3">
              <span class="fs-5 fw-bold">Total:</span>
              <span class="fs-5 fw-bold text-danger"
                >$<span id="summary-total">0.00</span></span
              >
            </div>
            <button
              class="btn btn-warning w-100 fw-bold mb-2"
              onclick="proceedToCheckout()"
            >
              Proceed to Checkout
            </button>
            <a href="index.html" class="btn btn-outline-secondary w-100">
              Continue Shopping
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5">
      <!-- Back to Top -->
      <div
        class="bg-[#37475a] text-white text-center py-3 cursor-pointer hover:bg-[#485769]"
      >
        <a href="#" class="text-white text-decoration-none">Back to Top</a>
      </div>

      <!-- Copyright -->
      <div class="bg-[#0f1111] text-light py-4">
        <div class="container text-center">
          <div class="small text-secondary">
            © 1996-2026, Amazon.com, Inc. or its affiliates
          </div>
        </div>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Config -->
    <script src="config.js"></script>
    <!-- Custom JS -->
    <script src="cart.js"></script>
    <script src="cart-page.js"></script>
  </body>
</html>
